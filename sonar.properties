# --- Database Settings ---
# By default, SonarQube uses an embedded H2 database (fine for local testing).
sonar.embeddedDatabase.port=9092

# --- Web Server Settings ---
sonar.web.host=127.0.0.1
sonar.web.port=9000
sonar.web.javaOpts=-Xmx512m -Xms128m -XX:+HeapDumpOnOutOfMemoryError

# --- Search (Elasticsearch) Settings ---
# Windows often struggles with the default memory mapping. 
# We force Elasticsearch to use a simpler file system access if possible.
sonar.search.javaOpts=-Xms512m -Xmx512m -XX:+HeapDumpOnOutOfMemoryError

# --- Project Metadata (Your specific project) ---
sonar.projectKey=securenet-parent-portal
sonar.projectName=SecureNet Parent Portal
sonar.projectVersion=1.0
sonar.sources=app,scripts
sonar.language=py
sonar.sourceEncoding=UTF-8
sonar.python.version=3.11
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,**/terraform/**,**/k8s/**,**/docs/**,**/.env*
